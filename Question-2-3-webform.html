<!DOCTYPE html>
<html lang="en">

<head>
  <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
  <meta charset="utf-8">
  <style>
    .control,
    fieldset {
      margin: 6px 0;
    }

    label {
      display: inline-block;
      width: 120px;
      vertical-align: top;
    }

    input+label {
      width: auto;
    }

    .error,
    .required {
      color: red;
    }

    fieldset ul {
      margin: 0;
    }
  </style>
</head>

<body>
  <h1>Feedback form</h1>
  <form>
    <div class="control">
      <!--Added label association using for/id -->
      <label for="name">Full name <span class="required">*</span></label>
      <input id="name" name="name" type="text" />
    </div>
    <div class="control">
      <!-- Added label association using for/id -->
      <label for="biography">Biography</label>
      <textarea id="biography" name="biography"></textarea>
      <span>Include examples on your skills in JavaScript.</span>
    </div>

    <!-- Use a fieldset for radio group -->
    <fieldset class="control" id="gender_group">
      <legend>Gender</legend>
      <div class="control">
        <!-- Added label association using for/id -->
        <input id="gender_male" name="gender" type="radio" value="male" />
        <label for="gender_male">Male</label>
      </div>
      <div class="control">
        <input id="gender_female" name="gender" type="radio" value="female" />
        <label for="gender_female">Female</label>
      </div>
    </fieldset>

    <div class="control">
      <!-- Added label association using for/id -->
        <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" />
        <label for="accept_agbs">I accept the terms and conditions</label>
    </div>
    <div class="control">
      <input name="validate" type="hidden" value="1" /><input type="submit" value="Register" />
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"
    integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
  <script>"use strict";

    ;
    (function () {
      var validateInput;

      $.urlParam = function (name) {
        var results;
        results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);

        if (results === null) {
          return null;
        } else {
          return decodeURI(results[1]) || null;
        }
      };

      validateInput = function validateInput(input, message) {
        var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;
        $input = $('[name="' + input + '"]');

        // If the value is missing from URL params treat as invalid and add an error
        if ((value = $.urlParam(input)) === null) {
          if ($('fieldset.errors').length === 0) {
            /* Create an error summary at the top:
               - tabindex="-1" allows us to move focus here after validation
               - role="alert" + aria-live helps screen readers announce it */
            $('form').prepend(
              '<fieldset class="errors" tabindex="-1" role="alert" aria-live="assertive">' +
              '<legend>Errors</legend><ul></ul></fieldset>'
            );
          }

          $referencedElement = null;
          $elementToDescribe = null;
          $errorContainer = $('fieldset.errors ul');

          if ($input.is(':radio')) {
            $fieldset = $input.closest('fieldset');
            $elementToDescribe = $fieldset;
            $referencedElement = $input.filter(':first'); // focus first radio in the group
            // Mark radio group inputs as invalid for assistive tech
            $input.attr('aria-invalid', 'true');
          } else {
            $elementToDescribe = $input;
            $referencedElement = $input;
            // Mark field as invalid for assistive tech
            $input.attr('aria-invalid', 'true');
          }

          /* Make each error a real link that targets the invalid field */
          $error = $('<a href="#' + $referencedElement.attr('id') + '">' + message + '</a>');

          $error.click(function (e) {
            // Keep explicit focus
            $referencedElement.focus();
            return e.preventDefault();
          });

          /* Add class="error" so we can detect errors and avoid showing the success alert
             (Previously $('.error').length was always 0 because nothing had class="error") */
          $errorContainer.append('<li class="error"></li>').find('li:last').append($error);

          /* Removed aria-describedby because it pointed to non-existent IDs */

        } else {
          // If URL param exists, populate the field and clear invalid state
          if ($input.is(':checkbox')) {
            $input.attr('checked', true);
            $input.removeAttr('aria-invalid');
          } else if ($input.is(':radio')) {
            $input.removeAttr('aria-invalid');
            $input.filter('[value="' + value + '"]').prop('checked', true);
          } else {
            $input.removeAttr('aria-invalid');
            $input.val(value);
          }
        }
      };

      $(document).ready(function () {
        if ($.urlParam('validate')) {

          // Remove previous error summary if user revalidates
          $('fieldset.errors').remove();
          $('[aria-invalid="true"]').removeAttr('aria-invalid');

          validateInput('name', 'Please enter your name!');
          validateInput('biography', 'Please tell us something about your history!');
          validateInput('gender', 'Please tell us your gender!');
          validateInput('accept_agbs', 'You must accept our terms and conditions!');

          // move focus to the error summary after submit if errors exist
          if ($('fieldset.errors').length > 0) {
            $('fieldset.errors').focus();
            return;
          }

          // Success alert appears only when there are no errors
          if ($('.error').length === 0) {
            return alert('All inputs are valid.');
          }
        }
      });
    }).call(void 0);
  </script>

</body>

</html>
